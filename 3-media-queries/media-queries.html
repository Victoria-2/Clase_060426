<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ejemplo media queries</title>
    <link rel="stylesheet" href="./media-queries.css" />
  </head>
  <body>
    <!-- ctrl + } es hacer comentario lo seleccionado -->
    <!-- ctrl + shift + l -> cambias todo lo q tenga el mismo valor al mismo tiempo -->

    <div class="grid-container">
      <div class="box" style="grid-area: box-1"></div>
      <div class="box" style="grid-area: box-2"></div>
      <div class="box" style="grid-area: box-3"></div>
      <div class="box" style="grid-area: box-4"></div>
      <div class="box" style="grid-area: box-5"></div>
    </div>
  </body>
</html>
